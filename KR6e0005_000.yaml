body:
  text: 華嚴經文義綱目刊行序按凝然師述法界義鏡曰天平八年大唐道律師齎此宗疏章而來又審祥大德者新羅國人也嘗入唐謁賢首受學華嚴宗而來此國住大安寺應良辨等請講華嚴經然則初傳章疏師有功最初開講祥公為尊也此章之傳雖未見實據祥兩師之間焉又我弘法大師釋華嚴教往往取則是章疑璿公等將來之本故大師亦有所受歟且請來録不載此章則受學于本邦者居然可見矣且餘諸師亦能繹此章以綜文義之綱目況本宗古德等據此論理翼成教觀辨駁通議以作一家之學好古之徒豈可不研核耶雖然本邦中世以來賢首宗教沈貝葉而振者鮮矣其疏章亦寢散失末學者寧不慨然乎豫亦嚮發願欲搜羅墜編未有所得今獲是章無異窮子見衣中之珠也嗚呼亦時節因緣使然耶抑護法善神所授耶喜躍之餘輒加點校以付剞劂以布遐邇庶幾華藏之佛日再矚幽途圓融之法水永回狂瀾耳是為序時元祿甲戌七年臘月穀旦東奧仙臺龍寶住持比丘長與實養題於洛之智積輪下
